    <style>
        /* ==========================================================================
           VADİX ÖZEL RENK PALETİ VE ANA TASARIM DEĞİŞKENLERİ
           Bu bölüm, sitenin genel tema renklerini belirler. 
           Değiştirmek istersen sadece buradaki HEX kodlarını güncellemen yeterlidir.
           ========================================================================== */
        :root {
            --arkaplan: #050508; /* En arka plan için derin siyah tonu */
            --kart-bg: #111116;  /* İçerik kartları için koyu gri ton */
            --vurgu-renk: #8A2BE2; /* Senin sevdiğin Mor (Primary Accent) */
            --vurgu-neon: #39FF14; /* Senin sevdiğin Neon Yeşil (Secondary Accent) */
            --yazi: #ffffff;       /* Ana metin rengi (Beyaz) */
            --yazi-soluk: #a0a0a0; /* Alt metinler ve açıklamalar için soluk gri */
        }

        /* GENEL GÖVDE (BODY) AYARLARI */
        body {
            background-color: var(--arkaplan);
            color: var(--yazi);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Yatayda istenmeyen taşmaları engeller */
        }

        /* ==========================================================================
           ÖZEL KAYDIRMA ÇUBUĞU (SCROLLBAR) TASARIMI
           Tarayıcının varsayılan çirkin kaydırma çubuğunu VadiX temasına uydurur.
           ========================================================================== */
        ::-webkit-scrollbar { 
            width: 8px; 
            height: 8px; 
        }
        ::-webkit-scrollbar-track { 
            background: var(--arkaplan); 
        }
        ::-webkit-scrollbar-thumb { 
            background: var(--vurgu-renk); 
            border-radius: 10px; 
        }

        /* ==========================================================================
           ÜST MENÜ (NAVBAR) VE LOGO TASARIMI
           Sayfanın en üstünde sabit duran, kaydırdıkça arka planı bulanıklaşan menü.
           ========================================================================== */
        header {
            background: linear-gradient(to bottom, rgba(5,5,8,1) 0%, rgba(5,5,8,0) 100%);
            padding: 20px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            transition: 0.3s;
        }

        /* Kaydırma animasyonu aktif olduğunda devreye giren sınıf */
        header.scrolled {
            background: rgba(5, 5, 8, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(138, 43, 226, 0.3);
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        .logo {
            font-size: 32px;
            font-weight: 900;
            color: white;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .logo span { 
            color: var(--vurgu-neon); 
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); 
        }

        .nav-menu { 
            display: flex; 
            gap: 25px; 
        }
        
        .nav-menu button {
            background: transparent;
            color: var(--yazi-soluk);
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        
        .nav-menu button:hover, .nav-menu button.aktif { 
            color: white; 
            font-weight: 700; 
        }

        .nav-menu button.aktif::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--vurgu-renk);
            box-shadow: 0 0 10px var(--vurgu-renk);
        }

        /* ==========================================================================
           VİDEO OYNATICI (SİNEMA EKRANI) - HİBRİT SİSTEM
           Direkt açılan, aracı buton barındırmayan net tasarım.
           ========================================================================== */
        .player-wrapper {
            margin-top: 130px;
            width: 100%;
            height: 70vh;
            background: #000;
            display: none;
            position: relative;
            border-bottom: 2px solid var(--vurgu-renk);
            box-shadow: 0 15px 50px rgba(138, 43, 226, 0.15);
            animation: asagiAcil 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes asagiAcil { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); } 
        }
        
        /* Iframe ve Video elementlerinin genel ayarı */
        .player-wrapper iframe, .player-wrapper video { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        .btn-oynatici-kapat {
            position: absolute;
            top: -45px;
            right: 5%;
            background: var(--vurgu-renk);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            font-weight: bold;
            z-index: 1001;
        }
        /* Yeni Tam Ekran butonu stili */
        .btn-tam-ekran {
            position: absolute;
            top: -45px;
            right: calc(5% + 120px); /* Kapat butonunun soluna konumlandır */
            background: rgba(255,255,255,0.1); /* Hafif şeffaf bir arka plan */
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            font-weight: bold;
            z-index: 1001;
            transition: background 0.3s;
        }
        .btn-tam-ekran:hover {
            background: var(--vurgu-neon); /* Hover durumunda neon yeşil */
            color: black;
        }



        /* ==========================================================================
           İÇERİK BÖLÜMÜ VE KATEGORİ BAŞLIKLARI
           ========================================================================== */
        main { 
            padding: 100px 5% 50px 5%; 
            min-height: 75vh; 
        }

        .kategori-baslik {
            font-size: 24px;
            color: white;
            margin: 50px 0 25px 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .kategori-baslik::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 24px;
            background: var(--vurgu-neon);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--vurgu-neon);
        }

        /* ==========================================================================
           YENİ AŞAĞI DOĞRU IZGARA (GRID) SİSTEMİ
           Yana kaydırma iptal edildi, Netflix stili aşağı doğru açılan sistem eklendi.
           ========================================================================== */
        .grid-satir {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding-bottom: 20px;
        }

        /* ==========================================================================
           VADİX PREMİUM KART TASARIMI
           İçeriklerin sergilendiği resimli kutular.
           ========================================================================== */
        .film-kart {
            width: 100%;
            height: 180px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
        }

        .film-kart:hover {
            transform: scale(1.04) translateY(-5px);
            z-index: 10;
            border-color: var(--vurgu-renk);
            box-shadow: 0 15px 30px rgba(138, 43, 226, 0.4);
        }

        .kart-golge {
            position: absolute;
            bottom: 0; 
            width: 100%; 
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 18px;
            box-sizing: border-box;
            border-radius: 12px;
        }

        .kart-baslik { 
            color: white; 
            font-size: 17px; 
            font-weight: 700; 
            margin: 0 0 10px 0; 
        }
        
        .etiket-kapsayici { 
            display: flex; 
            gap: 8px; 
            align-items: center; 
        }
        .kart-etiket {
            font-size: 11px;
            font-weight: 700;
            background: rgba(255,255,255,0.15);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        
        /* Canlı yayınlar için nefes alıp veren özel etiket animasyonu */
        .etiket-canli { 
            background: #ff0033; 
            box-shadow: 0 0 10px #ff0033;
            animation: nefesAl 2s infinite; 
        }
        @keyframes nefesAl { 
            0% {opacity:1;} 
            50% {opacity:0.6;} 
            100% {opacity:1;} 
        }

        /* ==========================================================================
           BİLGİ PENCERESİ (MODAL) VE DETAY EKRANI
           Tıklanan içeriğin detaylarının gösterildiği devasa ekran.
           ========================================================================== */
        .modal-bg {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000; 
            display: none;
            justify-content: center; 
            align-items: center;
            padding: 20px; 
            box-sizing: border-box;
        }

        .modal-icerik {
            background: var(--kart-bg);
            width: 100%; 
            max-width: 950px;
            border-radius: 20px;
            display: flex; 
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.3);
            border: 1px solid #222;
            max-height: 90vh;
        }

        .modal-gorsel { 
            flex: 1; 
            background-size: cover; 
            background-position: center; 
            min-height: 400px; 
            position: relative; 
        }
        .modal-gorsel::after {
            content: ''; 
            position: absolute; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%;
            background: linear-gradient(to right, transparent 0%, var(--kart-bg) 100%);
        }
        
        .modal-detay { 
            flex: 1.2; 
            padding: 50px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            z-index: 2; 
            overflow-y: auto;
        }
        
        .modal-baslik { 
            font-size: 36px; 
            color: white; 
            margin: 0 0 15px 0; 
            font-weight: 900; 
            line-height: 1.1; 
        }
        .modal-meta { 
            font-size: 14px; 
            color: var(--yazi-soluk); 
            margin-bottom: 25px; 
            font-weight: 500; 
        }
        .modal-meta span { 
            color: white; 
            margin-right: 15px; 
            font-weight: bold; 
        }
        .puan-etiket { 
            color: var(--vurgu-neon) !important; 
            text-shadow: 0 0 5px var(--vurgu-neon); 
        }
        
        .modal-ozet { 
            font-size: 15px; 
            line-height: 1.8; 
            margin-bottom: 20px; 
            color: #d0d0d0; 
        }
        
        /* ==========================================================================
           ÇOKLU BÖLÜM BUTONLARI (BÖLÜM SEÇİCİSİ)
           ========================================================================== */
        .bolum-alani {
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            padding-bottom: 10px; 
            margin-bottom: 15px;
        }
        .bolum-btn {
            background: rgba(138, 43, 226, 0.2); 
            color: white; 
            border: 1px solid var(--vurgu-renk);
            padding: 10px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            white-space: nowrap; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .bolum-btn:hover { 
            background: var(--vurgu-renk); 
            box-shadow: 0 0 15px var(--vurgu-renk); 
            transform: translateY(-2px); 
        }

        .btn-oynat {
            background: var(--vurgu-renk); 
            color: white;
            border: none; 
            padding: 16px 35px;
            font-size: 18px; 
            font-weight: 900;
            border-radius: 30px; 
            cursor: pointer;
            transition: 0.3s; 
            width: max-content;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.4);
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        .btn-oynat:hover { 
            background: var(--vurgu-neon); 
            color: black; 
            box-shadow: 0 5px 20px rgba(57, 255, 20, 0.5); 
            transform: translateY(-3px); 
        }

        .btn-kapat {
            position: absolute; 
            top: 20px; 
            right: 25px;
            background: rgba(255,255,255,0.1); 
            color: white;
            border: none; 
            font-size: 20px;
            width: 40px; 
            height: 40px; 
            border-radius: 50%;
            cursor: pointer; 
            z-index: 10; 
            transition: 0.3s;
        }
        .btn-kapat:hover { 
            background: #ff0033; 
            transform: rotate(90deg); 
        }

        /* ==========================================================================
           UYARI KUTUSU (BİLGİLENDİRME PANELİ)
           ========================================================================== */
        .hata-uyari {
            background: rgba(255, 0, 51, 0.1);
            border-left: 4px solid #ff0033;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 13px;
            color: #ffcccc;
            display: none;
        }

        /* ==========================================================================
           MOBİL UYUM (RESPONSIVE TASARIM)
           ========================================================================== */
        @media (max-width: 850px) {
            header { padding: 15px 5%; flex-direction: column; gap: 15px; }
            .nav-menu { width: 100%; justify-content: space-between; overflow-x: auto; padding-bottom: 5px; }
            .player-wrapper { height: 35vh; margin-top: 110px; }
            main { padding-top: 130px; }
            .film-kart { min-width: 100%; height: 200px; }
            .modal-icerik { flex-direction: column; }
            .modal-gorsel { min-height: 200px; }
            .modal-gorsel::after { background: linear-gradient(to bottom, transparent 0%, var(--kart-bg) 100%); }
            .modal-detay { padding: 30px; }
            .modal-baslik { font-size: 26px; }
            .grid-satir { grid-template-columns: 1fr; }
        }
    </style>
</head>

        // Sayfa ilk yüklendiğinde otomatik olarak "Tümü" filtresini çalıştırır.
        window.onload = () => filtrele('hepsi', null);
        
        // Logoya tıklayınca sayfayı yeniler
        function sayfaYenile() { location.reload(); }

        // ==========================================================================
        // İÇERİK FİLTRELEME VE ANA EKRANA DİZME MOTORU
        // ==========================================================================
        function filtrele(istenenKategori, btn) {
            const butonlar = document.querySelectorAll('.nav-menu button');
            butonlar.forEach(b => b.classList.remove('aktif'));
            
            if (btn) {
                btn.classList.add('aktif');
            } else {
                butonlar[0].classList.add('aktif');
            }

            const anaEkran = document.getElementById('icerikEkrani');
            anaEkran.innerHTML = ""; 

            const satirlar = [
                { id: "film", baslik: "Unutulmaz Sinema Filmleri" },
                { id: "dizi", baslik: "Popüler Dizi Arşivi" },
                { id: "canli", baslik: "Canlı Haber & Eğlence" },
                { id: "cizgi", baslik: "Çocuk & Çizgi Film Kanalları" }
            ];

            satirlar.forEach(satir => {
                if (istenenKategori !== 'hepsi' && satir.id !== istenenKategori) return;

                const icerikler = veritabani.filter(v => v.kat === satir.id);
                if (icerikler.length === 0) return;

                let html = `<h2 class="kategori-baslik">${satir.baslik}</h2><div class="grid-satir">`;
                
                icerikler.forEach(icerik => {
                    let etiketClass = icerik.yil === "CANLI" ? "kart-etiket etiket-canli" : "kart-etiket";
                    
                    html += `
                        <div class="film-kart" style="background-image: url('${icerik.gorsel}')" onclick="modalAc('${icerik.id}')">
                            <div class="kart-golge">
                                <h3 class="kart-baslik">${icerik.baslik}</h3>
                                <div class="etiket-kapsayici">
                                    <span class="${etiketClass}">${icerik.tur}</span>
                                    <span class="kart-etiket">${icerik.puan}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
                anaEkran.innerHTML += html;
            });
        }

        // ==========================================================================
        // BİLGİ PENCERESİ AÇMA FONKSİYONU
        // ==========================================================================
        function modalAc(id) {
            const film = veritabani.find(v => v.id === id);
            document.getElementById('modalResim').style.backgroundImage = `url('${film.gorsel}')`;
            document.getElementById('modalAd').innerText = film.baslik;
            document.getElementById('modalYil').innerText = film.yil;
            document.getElementById('modalKategori').innerText = film.tur;
            document.getElementById('modalPuan').innerText = film.puan;
            document.getElementById('modalOzet').innerText = film.ozet;
            
            // Eğer hata potansiyeli olan bir canlı yayın değilse uyarıyı göster
            if(film.kat === 'dizi') {
                document.getElementById('hataUyari').style.display = 'block';
            } else {
                document.getElementById('hataUyari').style.display = 'none';
            }

            const bolumKutusu = document.getElementById('bolumKutusu');
            const tekliOynatBtn = document.getElementById('modalOynatBtn');
            
            bolumKutusu.innerHTML = ''; 

            if(film.bolumler && film.bolumler.length > 0) {
                tekliOynatBtn.style.display = 'none'; 
                bolumKutusu.style.display = 'flex';   
                
                film.bolumler.forEach(bolum => {
                    const btn = document.createElement('button');
                    btn.className = 'bolum-btn';
                    btn.innerText = bolum.ad;
                    btn.onclick = () => videoOynat(bolum.yt);
                    bolumKutusu.appendChild(btn);
                });
            } else {
                tekliOynatBtn.style.display = 'flex'; 
                bolumKutusu.style.display = 'none';   
                tekliOynatBtn.onclick = () => videoOynat(film.ytId);
            }
            
            document.getElementById('modal').style.display = "flex";
        }

        function modalKapat() { 
            document.getElementById('modal').style.display = "none"; 
        }

        // ==========================================================================
        // OYNATICI FONKSİYONU (DİREKT BAŞLATMA - BUTON İPTAL EDİLDİ!)
        // Bu sistem, her türlü linki bekleme ekranı olmadan direkt açar.
        // ==========================================================================
        function videoOynat(gelenVeri) {
            modalKapat(); // Bilgi penceresini kapat
            
            const oynatici = document.getElementById('oynaticiKutusu');
            const iframe = document.getElementById('videoEkrani');
            const videoTag = document.getElementById('yerelOynatici');
            
            // Tüm oynatıcı alt elementlerini başlangıçta gizle
            iframe.style.display = "none";
            videoTag.style.display = "none";
            
            // Mevcut verileri sıfırla
            iframe.src = "";
            videoTag.src = "";
            
            // Ana oynatıcı kutusunu görünür yap
            oynatici.style.display = "block";

            // DURUM 1: Eğer link .mp4 veya .m3u8 gibi direkt bir dosya uzantısı ise
            if (gelenVeri.includes('.mp4') || gelenVeri.includes('.m3u8')) {
                videoTag.style.display = "block";
                videoTag.src = gelenVeri;
            } 
            // DURUM 2: PuhuTV, Star TV gibi herhangi bir HTTP linki ise direkt iframe içinde şak diye başlat!
            else if (gelenVeri.startsWith('http')) {
                iframe.style.display = "block";
                iframe.src = gelenVeri;
            }
            // DURUM 3: Gelen veri sadece kısa bir YouTube ID'si ise YouTube olarak başlat
            else {
                iframe.style.display = "block";
                iframe.src = `https://www.youtube.com/embed/${gelenVeri}?autoplay=1`;
            }

            // Sayfayı yavaşça oynatıcıya kaydır
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==========================================================================
        // OYNATICI KAPATMA VE TEMİZLEME FONKSİYONU
        // ==========================================================================
        function oynaticiKapat() {
            const oynatici = document.getElementById('oynaticiKutusu');
            const iframe = document.getElementById('videoEkrani');
            const videoTag = document.getElementById('yerelOynatici');
            
            oynatici.style.display = "none";
            
            // Arka planda ses gelmemesi için kaynakları temizle
            iframe.src = ""; 
            videoTag.src = "";
            videoTag.pause(); // Eğer yerel video açıksa oynatmayı durdur
        }

        // ==========================================================================
        // TAM EKRAN MODU AÇMA/KAPATMA FONKSİYONU
        // ==========================================================================
        function toggleFullscreen() {
            const playerWrapper = document.getElementById('oynaticiKutusu');
            if (!document.fullscreenElement) {
                if (playerWrapper.requestFullscreen) {
                    playerWrapper.requestFullscreen();
                } else if (playerWrapper.mozRequestFullScreen) { /* Firefox */
                    playerWrapper.mozRequestFullScreen();
                } else if (playerWrapper.webkitRequestFullscreen) { /* Chrome, Safari & Opera */
                    playerWrapper.webkitRequestFullscreen();
                } else if (playerWrapper.msRequestFullscreen) { /* IE/Edge */
                    playerWrapper.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
